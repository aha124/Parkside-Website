name: Update Events from Website

# This workflow automatically fetches the latest events from the Parkside Harmony website
# It runs daily at midnight, when the script is modified, or when manually triggered
# Note: News is now managed through the admin dashboard, not scraped

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  push:
    paths:
      - 'scripts/scrapeEventsPage.js'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write  # Needed to commit and push changes

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'  # Cache npm dependencies

      - name: Install dependencies
        run: npm install puppeteer cheerio uuid

      - name: Scrape events from website
        run: node scripts/scrapeEventsPage.js
        continue-on-error: true  # Continue even if this step fails

      - name: Commit and push if there are changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/events.json

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update events from website scraping"
            git push
          fi