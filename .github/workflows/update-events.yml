name: Update Events from Website

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  push:
    paths:
      - 'scripts/scrapeEventsPage.js'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install puppeteer cheerio uuid
        
      - name: Scrape events from website
        run: node scripts/scrapeEventsPage.js
        
      - name: Commit and push if there are changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/events.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update events from website scraping"
          git push